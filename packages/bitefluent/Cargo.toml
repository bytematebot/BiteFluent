[package]
name = "bitefluent"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
dioxus = { version = "0.7.9", features = ["router", "fullstack"] }

dioxus-auth = { path = "../dioxus-auth", default-features = false, optional = true }

axum = { version = "0.8", optional = true }
tower-cookies = { version = "0.11", optional = true }
anyhow = { version = "1", optional = true }
dotenvy = { version = "0.15", optional = true }
byteorm-client = { path = "generated", optional = true}
time = { version = "0.3.47", optional = true }
async-trait = { version = "0.1.89", optional = true }
chrono = { version = "0.4", optional = true }
uuid = { version = "1", features = ["v4"], optional = true }
serde = { version = "1.0.228", features = ["derive"]}
reqwest = { version = "0.13.3", features = ["json", "query"], optional = true }
tracing = "0.1.44"
rustls = { version = "0.23", features = ["ring"], optional = true }

[features]
default = ["web"]

web = ["dioxus/web"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]

server = [
    "dioxus/server",
    "dep:dioxus-auth",
    "dioxus-auth/axum",
    "dep:axum",
    "dep:tower-cookies",
    "dep:anyhow",
    "dep:dotenvy",
    "dep:byteorm-client",
    "dep:time",
    "dep:async-trait",
    "dep:chrono",
    "dep:uuid",
    "dep:reqwest",
    "dep:rustls",
]
