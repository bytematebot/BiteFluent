name: Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Restore generated path dependency stub
        run: |
          mkdir -p packages/bitefluent/generated/src
          cat > packages/bitefluent/generated/Cargo.toml <<'EOF'
          [package]
          name = "byteorm-client"
          version = "0.1.0"
          edition = "2024"

          [dependencies]
          EOF
          cat > packages/bitefluent/generated/src/lib.rs <<'EOF'
          //! CI stub for the ignored generated byteorm client package.
          EOF

      - run: cargo fmt --all -- --check

